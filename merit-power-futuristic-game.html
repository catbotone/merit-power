<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Merit Power</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0, 255, 255, .20), transparent 35%),
        radial-gradient(circle at bottom, rgba(147, 51, 234, .22), transparent 35%),
        linear-gradient(135deg, #050816, #0b1024 55%, #070a18);
      color: #e5faff;
      text-align: center;
      padding: 18px 14px 28px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,.06) 1px, transparent 1px);
      background-size: 34px 34px;
      pointer-events: none;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.9), rgba(0,0,0,.15));
    }

    h1 {
      margin: 10px 0 18px;
      font-size: 36px;
      line-height: 1.05;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow:
        0 0 8px #00eaff,
        0 0 22px rgba(0,234,255,.8),
        0 0 40px rgba(168,85,247,.6);
    }

    .subtitle {
      margin-top: -8px;
      margin-bottom: 16px;
      color: #8eeeff;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .lock-panel {
      position: relative;
      max-width: 520px;
      margin: 0 auto 18px;
      background: rgba(8, 15, 35, .86);
      border: 1px solid rgba(0, 234, 255, .65);
      border-radius: 22px;
      padding: 16px;
      box-shadow:
        0 0 18px rgba(0,234,255,.28),
        inset 0 0 18px rgba(0,234,255,.08);
      backdrop-filter: blur(8px);
    }

    .lock-panel::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 17px;
      border: 1px solid rgba(168,85,247,.35);
      pointer-events: none;
    }

    .lock-button {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 60px;
      border: 1px solid #67e8f9;
      border-radius: 16px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #10213f, #111827);
      color: white;
      cursor: pointer;
      box-shadow:
        0 0 14px rgba(0,234,255,.45),
        inset 0 0 12px rgba(255,255,255,.08);
    }

    .status {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      font-size: 18px;
      font-weight: 800;
      color: #94a3b8;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .cards {
      display: grid;
      gap: 18px;
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, .94), rgba(2, 6, 23, .94));
      border-radius: 26px;
      padding: 24px 16px 20px;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow:
        0 14px 30px rgba(0,0,0,.45),
        inset 0 0 22px rgba(255,255,255,.04);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 0;
      height: 4px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, var(--glow), transparent);
      box-shadow: 0 0 20px var(--glow);
    }

    .grant-card {
      --glow: #38bdf8;
      border-color: rgba(56,189,248,.55);
    }

    .walker-card {
      --glow: #22c55e;
      border-color: rgba(34,197,94,.55);
    }

    .name {
      margin: 0;
      font-size: 34px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: white;
      text-shadow: 0 0 14px var(--glow);
    }

    .rank {
      margin-top: 4px;
      color: #94a3b8;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hours {
      margin: 16px 0 2px;
      font-size: 78px;
      line-height: 1;
      font-weight: 900;
      color: #ffffff;
      text-shadow:
        0 0 12px var(--glow),
        0 0 30px rgba(255,255,255,.18);
    }

    .sub {
      color: #a5f3fc;
      font-size: 16px;
      margin-bottom: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .bar-shell {
      padding: 9px;
      border-radius: 18px;
      background: rgba(2,6,23,.9);
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: inset 0 0 14px rgba(0,0,0,.65);
      margin: 18px 0 22px;
    }

    .bar {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 4px;
    }

    .block {
      height: 36px;
      border-radius: 7px;
      background: rgba(148,163,184,.18);
      border: 1px solid rgba(148,163,184,.25);
    }

    .grant-fill {
      background: linear-gradient(180deg, #7dd3fc, #0284c7);
      border-color: #67e8f9;
      box-shadow: 0 0 12px rgba(56,189,248,.85);
    }

    .walker-fill {
      background: linear-gradient(180deg, #86efac, #16a34a);
      border-color: #86efac;
      box-shadow: 0 0 12px rgba(34,197,94,.85);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .score-button {
      min-height: 70px;
      border-radius: 18px;
      color: white;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,.35);
    }

    .plus {
      background: linear-gradient(180deg, #22c55e, #15803d);
      box-shadow: 0 0 16px rgba(34,197,94,.45);
    }

    .minus {
      background: linear-gradient(180deg, #ef4444, #991b1b);
      box-shadow: 0 0 16px rgba(239,68,68,.45);
    }

    .disabled {
      opacity: .32;
      cursor: not-allowed;
      filter: grayscale(.45);
      box-shadow: none;
    }

    .mission {
      margin-top: 14px;
      font-size: 12px;
      color: #64748b;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @media (min-width: 800px) {
      h1 {
        font-size: 48px;
      }

      .lock-panel {
        max-width: 720px;
      }

      .cards {
        max-width: 960px;
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <h1>⚡ Merit Power ⚡</h1>
  <div class="subtitle">Screen Time Energy System</div>

  <section class="lock-panel">
    <button id="lockButton" class="lock-button">🔒 Password</button>
    <div id="status" class="status">System Locked</div>
  </section>

  <main class="cards">
    <section class="card grant-card">
      <h2 class="name">Grant</h2>
      <div class="rank">Player One</div>
      <div id="grantHours" class="hours">0</div>
      <div class="sub">Hours Banked / 12</div>

      <div class="bar-shell">
        <div id="grantBar" class="bar"></div>
      </div>

      <div class="actions">
        <button id="grantPlus" class="score-button plus disabled">+1</button>
        <button id="grantMinus" class="score-button minus disabled">−1</button>
      </div>
      <div class="mission">Power Meter</div>
    </section>

    <section class="card walker-card">
      <h2 class="name">Walker</h2>
      <div class="rank">Player Two</div>
      <div id="walkerHours" class="hours">0</div>
      <div class="sub">Hours Banked / 12</div>

      <div class="bar-shell">
        <div id="walkerBar" class="bar"></div>
      </div>

      <div class="actions">
        <button id="walkerPlus" class="score-button plus disabled">+1</button>
        <button id="walkerMinus" class="score-button minus disabled">−1</button>
      </div>
      <div class="mission">Power Meter</div>
    </section>
  </main>

  <script>
    const MAX_HOURS = 12;
    const SAVE_KEY = "meritPowerFutureGameV1";

    let isUnlocked = false;
    let firstTapWaiting = false;
    let resetTapTimer = null;

    let scores = { grant: 0, walker: 0 };

    const savedScores = localStorage.getItem(SAVE_KEY);
    if (savedScores) {
      try {
        scores = JSON.parse(savedScores);
      } catch (error) {
        scores = { grant: 0, walker: 0 };
      }
    }

    const lockButton = document.getElementById("lockButton");
    const statusText = document.getElementById("status");

    const buttons = {
      grantPlus: document.getElementById("grantPlus"),
      grantMinus: document.getElementById("grantMinus"),
      walkerPlus: document.getElementById("walkerPlus"),
      walkerMinus: document.getElementById("walkerMinus")
    };

    function saveScores() {
      localStorage.setItem(SAVE_KEY, JSON.stringify(scores));
    }

    function clampHours(value) {
      return Math.max(0, Math.min(MAX_HOURS, value));
    }

    function drawBar(elementId, value, fillClass) {
      const bar = document.getElementById(elementId);
      bar.innerHTML = "";

      for (let i = 1; i <= MAX_HOURS; i++) {
        const block = document.createElement("div");
        block.className = "block";

        if (i <= value) {
          block.classList.add(fillClass);
        }

        bar.appendChild(block);
      }
    }

    function setEditingButtons(enabled) {
      Object.values(buttons).forEach(button => {
        button.disabled = !enabled;
        button.classList.toggle("disabled", !enabled);
      });
    }

    function render() {
      scores.grant = clampHours(Number(scores.grant) || 0);
      scores.walker = clampHours(Number(scores.walker) || 0);

      document.getElementById("grantHours").textContent = scores.grant;
      document.getElementById("walkerHours").textContent = scores.walker;

      drawBar("grantBar", scores.grant, "grant-fill");
      drawBar("walkerBar", scores.walker, "walker-fill");

      setEditingButtons(isUnlocked);
    }

    function unlock() {
      isUnlocked = true;
      firstTapWaiting = false;

      if (resetTapTimer) {
        clearTimeout(resetTapTimer);
        resetTapTimer = null;
      }

      lockButton.textContent = "🔒 Lock";
      statusText.textContent = "Editing Enabled";
      statusText.style.color = "#22c55e";

      render();
    }

    function lock() {
      isUnlocked = false;
      firstTapWaiting = false;

      if (resetTapTimer) {
        clearTimeout(resetTapTimer);
        resetTapTimer = null;
      }

      saveScores();

      lockButton.textContent = "🔒 Password";
      statusText.textContent = "System Locked";
      statusText.style.color = "#94a3b8";

      render();
    }

    function handleLockButton() {
      if (isUnlocked) {
        lock();
        return;
      }

      if (!firstTapWaiting) {
        firstTapWaiting = true;
        lockButton.textContent = "🔓 Tap Again";
        statusText.textContent = "Confirm Unlock";
        statusText.style.color = "#67e8f9";

        resetTapTimer = setTimeout(() => {
          if (!isUnlocked) {
            firstTapWaiting = false;
            lockButton.textContent = "🔒 Password";
            statusText.textContent = "System Locked";
            statusText.style.color = "#94a3b8";
          }
        }, 3000);

        return;
      }

      unlock();
    }

    function changeScore(kid, amount) {
      if (!isUnlocked) return;

      scores[kid] = clampHours(scores[kid] + amount);
      saveScores();
      render();
    }

    lockButton.addEventListener("click", handleLockButton);

    buttons.grantPlus.addEventListener("click", () => changeScore("grant", 1));
    buttons.grantMinus.addEventListener("click", () => changeScore("grant", -1));
    buttons.walkerPlus.addEventListener("click", () => changeScore("walker", 1));
    buttons.walkerMinus.addEventListener("click", () => changeScore("walker", -1));

    render();
  </script>
</body>
</html>
